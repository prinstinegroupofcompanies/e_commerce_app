# Markay Hall — Render backend (PostgreSQL + Next.js API server)
# Deploy: connect repo in Render Dashboard → New Blueprint → select render.yaml
# Docs: see DEPLOYMENT.md

databases:
  - name: markay-hall-db
    plan: basic-256mb # Starter-tier Postgres (legacy "starter" not available for new DBs)
    databaseName: markayhall
    user: markayhall

services:
  # Primary backend: Next.js server (API routes, uploads, webhooks, cron targets)
  - type: web
    name: markay-hall-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: >-
      npm ci &&
      node scripts/prepare-prisma.js &&
      npx prisma generate &&
      npx prisma db push &&
      npm run build
    startCommand: npm run start
    healthCheckPath: /api/config/public
    initialDeployHook: npm run users:production
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: markay-hall-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: Markay Hall
      - key: CRON_SECRET
        generateValue: true
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1

  # Hourly cart-abandonment reminders
  - type: cron
    name: markay-hall-cron-cart
    plan: starter
    schedule: "0 * * * *"
    runtime: node
    buildCommand: "exit 0"
    startCommand: >-
      curl -fsS -X GET "${MARKAY_API_URL}/api/cron/cart-abandonment?secret=${CRON_SECRET}"
    envVars:
      - key: MARKAY_API_URL
        sync: false
      - key: CRON_SECRET
        fromService:
          name: markay-hall-api
          type: web
          envVarKey: CRON_SECRET

  # Weekly analytics email (Mondays 08:00 UTC)
  - type: cron
    name: markay-hall-cron-analytics
    plan: starter
    schedule: "0 8 * * 1"
    runtime: node
    buildCommand: "exit 0"
    startCommand: >-
      curl -fsS -X GET "${MARKAY_API_URL}/api/cron/analytics-report?secret=${CRON_SECRET}"
    envVars:
      - key: MARKAY_API_URL
        sync: false
      - key: CRON_SECRET
        fromService:
          name: markay-hall-api
          type: web
          envVarKey: CRON_SECRET
